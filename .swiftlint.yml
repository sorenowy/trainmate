# Base
strict: false
check_for_updates: false
allow_zero_lintable_files: false

# Identifiers
identifier_name:
    excluded:
        - ui
        - id
        - pc

# Force casting as warning due to developer explicity.
force_cast: warning
force_try:
  severity: warning

# Line length
line_length:
    warning: 120
    error: 200
    ignores_comments: true
    ignores_urls: true
    
type_body_length:
    warning: 300
    error: 500
    
function_body_length:
    warning: 60
    error: 120
    
disabled_rules:
    - trailing_whitespace

# TODO: Set strict: true, remove warning level, set all as error.
